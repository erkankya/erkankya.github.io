<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Studio</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: rgba(0,0,0,0.4);
}

nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
}

/* HERO */
.hero {
    text-align: center;
    padding: 80px;
}

/* SECTIONS */
section {
    padding: 60px 20px;
    text-align: center;
}

/* PACKAGES */
.packages {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
}

.package {
    background: rgba(255,255,255,0.05);
    padding: 25px;
    width: 280px;
    border-radius: 12px;
}

.package h3 {
    margin: 0;
}

.price {
    font-size: 28px;
    color: #38bdf8;
}

.package button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    background: #38bdf8;
    border: none;
    cursor: pointer;
}

/* FORM */
form {
    max-width: 400px;
    margin: auto;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: none;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #020617;
}

html {
    scroll-behavior: smooth;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav>
    <h2>Game Studio</h2>
    <div>
        <a href="#home">Ana Sayfa</a>
        <a href="#packages">Paketler</a>
        <a href="#contact">İletişim</a>
    </div>
</nav>

<!-- HERO -->
<div id="home" class="hero">
    <h1>Unity Game Development Studio 🎮</h1>
    <p>Profesyonel oyun geliştirme hizmetleri</p>
</div>

<!-- PACKAGES -->
<section id="packages">
    <h2>Paketler</h2>

    <div class="packages">

        <div class="package">
            <h3>Basic</h3>
            <p class="price">$50</p>
            <p>Basit oyun prototype</p>
            <button onclick="selectPackage('Basic Paket')">
                Seç
            </button>
        </div>

        <div class="package">
            <h3>Standard</h3>
            <p class="price">$150</p>
            <p>Orta seviye oyun sistemi</p>
            <button onclick="selectPackage('Standard Paket')">
                Seç
            </button>
        </div>

        <div class="package">
            <h3>Premium</h3>
            <p class="price">$300</p>
            <p>Tam oyun geliştirme</p>
            <button onclick="selectPackage('Premium Paket')">
                Seç
            </button>
        </div>

    </div>
</section>

<!-- CONTACT -->
<section id="contact">
    <h2>Teklif Gönder</h2>

    <form onsubmit="sendMessage(event)">
        <input type="text" id="name" placeholder="Adınız" required>
        <textarea id="message" placeholder="Projenizi yazın" required></textarea>
        <button type="submit">Gönder</button>
    </form>

</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Game Studio</p>
</footer>

<script>
var selectedPackage = "";

function selectPackage(pkg) {
    selectedPackage = pkg;
    alert(pkg + " seçildi!");
    document.getElementById("contact").scrollIntoView();
}

function sendMessage(e) {
    e.preventDefault();

    var name = document.getElementById("name").value;
    var message = document.getElementById("message").value;

    var fullMessage = "Paket: " + selectedPackage + 
    "\nİsim: " + name + 
    "\nMesaj: " + message;

    var url = "https://wa.me/905425891056?text=" 
    + encodeURIComponent(fullMessage);

    window.open(url, "_blank");
}
</script>

</body>
</html>
