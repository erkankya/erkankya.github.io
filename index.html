<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erkan Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
}

nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
}

nav a:hover {
    color: #38bdf8;
}

/* HERO */
.hero {
    text-align: center;
    padding: 80px;
}

.hero img {
    width: 140px;
    border-radius: 50%;
    border: 3px solid #38bdf8;
    transition: 0.3s;
}

.hero img:hover {
    transform: scale(1.1);
}

.hero h1 {
    font-size: 48px;
    margin: 10px 0;

    background: linear-gradient(45deg, #38bdf8, #0ea5e9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* SECTIONS */
section {
    padding: 80px;
    text-align: center;
}

/* PROJECTS */
.projects {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 25px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 12px;
    width: 260px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 20px #38bdf8;
}

.card button {
    margin-top: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    background: #38bdf8;
    cursor: pointer;
}

/* SOCIAL */
.social a {
    display: inline-block;
    margin: 10px;
    padding: 12px 18px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.social a:hover {
    background: #38bdf8;
    transform: scale(1.1);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #020617;
}

/* SCROLL */
html {
    scroll-behavior: smooth;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav>
    <h2>Erkan</h2>
    <div>
        <a href="#home">Ana Sayfa</a>
        <a href="#about">Hakkımda</a>
        <a href="#projects">Projeler</a>
        <a href="#contact">İletişim</a>
    </div>
</nav>

<!-- HERO -->
<div id="home" class="hero">
    <img src="https://i.pravatar.cc/150?img=12">
    <h1>Erkan</h1>
    <p>Web Developer 🚀</p>
</div>

<!-- ABOUT -->
<section id="about">
    <h2>Hakkımda</h2>
    <p>Web geliştirme öğreniyorum ve modern, hızlı ve şık siteler yapıyorum.</p>
</section>

<!-- PROJECTS -->
<section id="projects">
    <h2>Projelerim</h2>

    <div class="projects">

        <div class="card">
            <h3>Proje 1</h3>
            <p>İlk web projem</p>
            <button onclick="window.open('https://github.com','_blank')">
                İncele
            </button>
        </div>

        <div class="card">
            <h3>Proje 2</h3>
            <p>JavaScript uygulaması</p>
            <button onclick="window.open('https://google.com','_blank')">
                İncele
            </button>
        </div>

        <div class="card">
            <h3>Proje 3</h3>
            <p>Mini araç</p>
            <button onclick="window.open('https://youtube.com','_blank')">
                İncele
            </button>
        </div>

    </div>
</section>

<!-- CONTACT -->
<section id="contact">
    <h2>İletişim</h2>

    <div class="social">
        <a href="https://instagram.com/omererkankaya" target="_blank">Instagram</a>
        <a href="https://twitter.com/Dileyzuzzl" target="_blank">Twitter</a>
        <a href="https://t.me/Thecoder" target="_blank">Telegram</a>
        <a href="https://wa.me/905425891056" target="_blank">WhatsApp</a>
    </div>

</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Erkan</p>
</footer>

</body>
</html>
