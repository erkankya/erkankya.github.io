<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erkan Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #020617;
    padding: 15px 30px;
}

nav h2 {
    margin: 0;
}

nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
}

nav a:hover {
    color: #38bdf8;
}

/* HERO */
.hero {
    text-align: center;
    padding: 100px 20px;
}

.hero h1 {
    font-size: 50px;
    margin: 0;
}

.hero p {
    font-size: 20px;
    margin: 10px 0 20px;
}

.hero button {
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    background: #38bdf8;
    cursor: pointer;
}

/* SECTIONS */
section {
    padding: 50px 20px;
    text-align: center;
}

.box {
    background: #1e293b;
    margin: 20px auto;
    padding: 20px;
    border-radius: 10px;
    width: 80%;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #020617;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav>
    <h2>Erkan</h2>
    <div>
        <a href="#">Ana Sayfa</a>
        <a href="#about">Hakkımda</a>
        <a href="#projects">Projeler</a>
        <a href="#contact">İletişim</a>
    </div>
</nav>

<!-- HERO -->
<div class="hero">
    <h1>Merhaba 👋</h1>
    <p>Ben Erkan, web geliştirici</p>
    <button onclick="alert('Hoşgeldin!')">Bana Tıkla</button>
</div>

<!-- ABOUT -->
<section id="about">
    <div class="box">
        <h2>Hakkımda</h2>
        <p>Web geliştirme öğreniyorum ve projeler yapıyorum.</p>
    </div>
</section>

<!-- PROJECTS -->
<section id="projects">
    <div class="box">
        <h2>Projelerim</h2>
        <p>Yakında projelerimi buraya ekleyeceğim 🚀</p>
    </div>
</section>

<!-- CONTACT -->
<section id="contact">
    <div class="box">
        <h2>İletişim</h2>
        <p>Bana ulaşmak için yakında iletişim bilgileri ekleyeceğim.</p>
    </div>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Erkan</p>
</footer>

</body>
</html>
