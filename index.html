<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erkan Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #020617;
    padding: 15px 30px;
}

nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
}

/* HERO */
.hero {
    text-align: center;
    padding: 80px 20px;
}

.hero img {
    width: 120px;
    border-radius: 50%;
    margin-bottom: 20px;
}

.hero h1 {
    font-size: 45px;
    margin: 0;
}

/* SECTIONS */
section {
    padding: 50px 20px;
    text-align: center;
}

/* PROJECTS */
.projects {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    width: 250px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* SOCIAL */
.social a {
    display: inline-block;
    color: #38bdf8;
    margin: 10px;
    text-decoration: none;
    font-size: 18px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #020617;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav>
    <h2>Erkan</h2>
    <div>
        <a href="#">Ana Sayfa</a>
        <a href="#">Hakkımda</a>
        <a href="#">Projeler</a>
        <a href="#">İletişim</a>
    </div>
</nav>

<!-- HERO -->
<div class="hero">
    <img src="https://i.pravatar.cc/150?img=12">
    <h1>Erkan</h1>
    <p>Web Developer 🚀</p>
</div>

<!-- ABOUT -->
<section>
    <h2>Hakkımda</h2>
    <p>Web geliştirme öğreniyorum ve projeler yapıyorum.</p>
</section>

<!-- PROJECTS -->
<section>
    <h2>Projelerim</h2>

    <div class="projects">
        <div class="card">
            <h3>Proje 1</h3>
            <p>İlk web projem</p>
        </div>

        <div class="card">
            <h3>Proje 2</h3>
            <p>JavaScript denemem</p>
        </div>

        <div class="card">
            <h3>Proje 3</h3>
            <p>Mini uygulama</p>
        </div>
    </div>
</section>

<!-- CONTACT -->
<section>
    <h2>İletişim</h2>

    <div class="social">
        <a href="https://instagram.com/">Instagram</a>
        <a href="https://twitter.com/">Twitter</a>
        <a href="https://t.me/">Telegram</a>
        <a href="https://linkedin.com/">LinkedIn</a>
        <a href="https://wa.me/">WhatsApp</a>
    </div>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Erkan</p>
</footer>

</body>
</html>
